services:
  app:
    build:
      context: .
      target: dev
    container_name: my-go-api
    command: air -c .air.toml
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      GO_ENV: development
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: my_go_app
      DB_PASSWORD: password
      DB_NAME: my_go_app
      DB_SSLMODE: disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-bookworm
    container_name: my-go-api-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: my_go_app
      POSTGRES_PASSWORD: password
      POSTGRES_DB: my_go_app
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U my_go_app -d my_go_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  go-mod-cache:
  postgres-data:
